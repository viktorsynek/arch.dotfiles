# =============================
# Monitors
# =============================
monitor=HDMI-A-1,1920x1080@144,0x0,1
monitor=DVI-D-1,1920x1080@60,1920x0,1,transform,1

# =============================
# Autostart
# =============================
exec-once = swaync
exec-once = swww-daemon
exec-once = sleep 1 && swww img /home/cnek/Pictures/coffe.jpg
exec-once = hyprshade on blue-light-filter
exec-once = ~/.config/hypr/startup.sh
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = ~/.config/hypr/spotify-notify.sh
exec-once = hypridle

# =============================
# Input
# =============================
input {
    follow_mouse = 0
    kb_layout = us,hu
    kb_variant = ,qwerty
    kb_options = grp:alt_shift_toggle
}

cursor {
    no_hardware_cursors = true
}

# =============================
# General
# =============================
general {
    gaps_in = 2.5
    gaps_out = 5
    border_size = 2
}

# =============================
# Decoration
# =============================
decoration {
    rounding = 0
}

# =============================
# Workspace bindings
# =============================
workspace = 1, monitor:HDMI-A-1, default:true
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:DVI-D-1, default:true
workspace = 4, monitor:DVI-D-1

# =============================
# Keybindings
# =============================
$mod = SUPER

# Terminal
bind = $mod, Return, exec, ghostty

# Close window
bind = $mod SHIFT, Q, killactive

# Switch workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

# Move window to workspace and follow
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Focus movement
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# Move windows
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r

# Resize mode (hold mod + R, then use hjkl)
bind = $mod, R, submap, resize
submap = resize
binde = , H, resizeactive, -50 0
binde = , L, resizeactive, 50 0
binde = , K, resizeactive, 0 -50
binde = , J, resizeactive, 0 50
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# Audio
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioStop, exec, playerctl stop
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# Applications
bind = $mod SHIFT, B, exec, brave
bind = $mod SHIFT, D, exec, discord
bind = $mod SHIFT, S, exec, spotify
bind = $mod SHIFT, F, exec, thunar
bind = $mod SHIFT, A, exec, pavucontrol
bind = $mod SHIFT, O, exec, obs
bind = $mod SHIFT, T, exec, teams-for-linux
bind = $mod SHIFT, G, exec, gimp

# Fullscreen
bind = $mod, F, fullscreen, 0

# Floating toggle
bind = $mod, T, togglefloating

# Screenshot
bind = CTRL SHIFT, O, exec, grimblast copy area

# App launcher (rofi as dmenu replacement)
bind = $mod, E, exec, rofi -show drun

# Reload config
bind = $mod SHIFT, R, exec, hyprctl reload

# Exit Hyprland
bind = $mod SHIFT, P, exec, hyprlock

# Picom (if you still want to use it)
bind = $mod, Y, exec, picom
bind = $mod SHIFT, Y, exec, pkill picom

# Night light
bind = $mod, N, exec, hyprshade on blue-light-filter
bind = $mod SHIFT, N, exec, hyprshade off

# =============================
# Status bar (waybar as i3bar replacement)
# =============================
exec-once = waybar
